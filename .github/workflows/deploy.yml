name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      space_id:
        description: "HuggingFace Space ID (e.g. user/incidentops)"
        required: false
        default: "incidentops/incidentops"

env:
  PYTHON_VERSION: "3.11"
  DOCKER_REGISTRY: "ghcr.io"
  IMAGE_NAME: "incidentops"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run validation suite
        run: python validate_submission.py

  build-and-push:
    name: Build & Push to HF Container Registry
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: https://huggingface.co/spaces/${{ github.event.inputs.space_id || 'incidentops/incidentops' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to HF Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.HF_TOKEN }}

      - name: Compute image tag
        id: vars
        run: |
          SPACE_ID="${{ github.event.inputs.space_id || 'incidentops/incidentops' }}"
          IMAGE_TAG="${DOCKER_REGISTRY}/${SPACE_ID}:${{ github.sha }}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "space_id=${SPACE_ID}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}

      - name: Trigger HF Space rebuild
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --quiet
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='${HF_TOKEN}')
          space_id = '${{ steps.vars.outputs.space_id }}'
          docker_repo = '${DOCKER_REGISTRY}/' + space_id.split('/')[0] + '/' + space_id.split('/')[1]
          try:
              api.upload_space_dockerfile(
                  space_id=space_id,
                  docker_repo=docker_repo,
                  docker_image_tag='${{ github.sha }}',
                  exists_ok=True,
              )
              print(f'Rebuild triggered for {space_id}')
          except Exception as e:
              print(f'Rebuild trigger note: {e}')
              print('Space will rebuild on next push to its repository.')
          "
